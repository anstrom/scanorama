# Codecov Configuration
# https://docs.codecov.io/docs/codecov-yaml

codecov:
  notify:
    after_n_builds: 2 # Wait for both unit and integration uploads before posting
    wait_for_ci: true

# Coverage settings
coverage:
  precision: 2 # Show coverage to 2 decimal places (e.g., 43.25%)
  round: down # Round down coverage percentages
  range: "40...100"

  status:
    project:
      default:
        target: auto # Compare to base branch coverage
        threshold: 2% # Allow 2% decrease without failing
        if_ci_failed: error

    patch:
      default:
        target: 40% # Fixed threshold for new/changed code
        threshold: 0%
        if_ci_failed: error
        informational: true # Show patch coverage without blocking — project check is the gate

# Ignore patterns — exclude test files and non-production code
ignore:
  - "**/*_test.go" # All Go test files
  - "**/test/**" # Test helper packages
  - "**/mocks/**" # Mock implementations
  - "**/testdata/**" # Test fixtures
  - "**/*.pb.go" # Generated protobuf files
  - "**/vendor/**" # Vendored dependencies
  - "cmd/**" # CLI entry points
  - "scripts/**" # Build scripts
  - "build/**" # Build artifacts
  - "dist/**" # Distribution files
  - "frontend/**" # Frontend (non-Go)
  - "docs/**" # Documentation

# Pull request comment settings
comment:
  layout: "reach,diff,flags,tree,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# GitHub Checks inline annotations
github_checks:
  annotations: true

# Coverage flags for unit vs integration split
flags:
  unit:
    paths:
      - internal/
    carryforward: true

  integration:
    paths:
      - internal/
    carryforward: true
