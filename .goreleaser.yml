version: 2

before:
  hooks:
    - go mod tidy

builds:
  # darwin builds are disabled until the zgrab2 → zmap/zcrypto/ct/x509
  # no-cgo darwin/arm64 gap is resolved (missing loadSystemRoots). Mac users
  # can `go install ./cmd/scanorama` locally where CGO defaults to on.
  - main: ./cmd/scanorama
    binary: scanorama
    goos:
      - linux
    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X 'main.version={{.Version}}'
      - -X 'main.commit={{.Commit}}'
      - -X 'main.buildTime={{.Date}}'

archives:
  - formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: scanorama
    package_name: scanorama
    vendor: Andreas Strøm
    homepage: https://github.com/anstrom/scanorama
    maintainer: Andreas Strøm <33042658+anstrom@users.noreply.github.com>
    description: |-
      Self-hosted network scanning and asset management.
      Scanorama discovers hosts, runs nmap-based scans, and tracks network
      inventory over time, exposing a REST API and web dashboard.
    license: MIT
    formats:
      - deb
      - rpm
    # Binary lands at /usr/bin/scanorama — matches ExecStart in the unit.
    bindir: /usr/bin
    # nmap is the scan engine; PostgreSQL is the datastore. The package targets a
    # local-Postgres install (peer auth, no passwords), so the DB server is a hard
    # dependency. The package name differs per distro, hence the format overrides.
    dependencies:
      - nmap
      - postgresql
    overrides:
      rpm:
        dependencies:
          - nmap
          - postgresql-server
    contents:
      - src: deploy/scanorama.service
        dst: /usr/lib/systemd/system/scanorama.service
      - src: deploy/config.example.yaml
        dst: /etc/scanorama/config.yaml
        type: "config|noreplace"
        file_info:
          mode: 0640
    scripts:
      postinstall: deploy/packaging/postinstall.sh
      preremove: deploy/packaging/preremove.sh
      postremove: deploy/packaging/postremove.sh

dockers:
  - image_templates:
      - "ghcr.io/anstrom/scanorama:latest"
      - "ghcr.io/anstrom/scanorama:{{ .Tag }}"
      - "ghcr.io/anstrom/scanorama:v{{ .Major }}"
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
  - image_templates:
      - "ghcr.io/anstrom/scanorama:latest-arm64"
      - "ghcr.io/anstrom/scanorama:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: arm64
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"

docker_manifests:
  - name_template: "ghcr.io/anstrom/scanorama:{{ .Tag }}"
    image_templates:
      - "ghcr.io/anstrom/scanorama:{{ .Tag }}-arm64"
      - "ghcr.io/anstrom/scanorama:{{ .Tag }}"
  - name_template: "ghcr.io/anstrom/scanorama:latest"
    image_templates:
      - "ghcr.io/anstrom/scanorama:latest-arm64"
      - "ghcr.io/anstrom/scanorama:latest"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  prerelease: auto
