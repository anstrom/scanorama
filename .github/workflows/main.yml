name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

env:
  NODE_VERSION: "22"

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  # Stage 0: Detect which paths changed so downstream jobs can skip if irrelevant
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  # Stage 1: Code Quality & Security (runs in parallel)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check code formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not properly formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          skip-cache: false
          skip-save-cache: false

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

  # Stage 2: Unit Tests (fast tests, no external dependencies)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nmap

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          go test -short -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          name: unit-coverage
          slug: anstrom/scanorama
          flags: unit
          fail_ci_if_error: true
          verbose: true

  # Stage 3: Frontend Tests (runs in parallel with integration and e2e)
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run tests
        run: npm test --prefix frontend

  # Stage 3: Integration Tests (requires database and services)
  # Always runs on pushes to main (to keep coverage data fresh) and on PRs
  # that touch backend code.  The path filter is bypassed on main so that
  # non-Go commits (docs, renovate, frontend) don't leave the Codecov badge
  # showing "unknown" due to a missing upload.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (needs.changes.outputs.backend == 'true' && needs.unit-tests.result == 'success')
      )

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scanorama_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Test services for scan tests
      nginx:
        image: nginx:alpine
        ports:
          - 8080:80
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:80 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      ssh:
        image: lscr.io/linuxserver/openssh-server:latest
        ports:
          - 8022:2222
        env:
          PUID: 1000
          PGID: 1000
          PASSWORD_ACCESS: true
          USER_PASSWORD: testpass
          USER_NAME: testuser
        options: >-
          --health-cmd "ps aux | grep sshd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: scanorama_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://localhost:6379
      # Test database configuration
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432
      TEST_DB_NAME: scanorama_test
      TEST_DB_USER: scanorama_test_user
      TEST_DB_PASSWORD: test_password_123
      CI: true
      # Opt into Node.js 24 for all JavaScript actions in this job.
      # codecov-action@v5 vendors github-script@v7.0.1 (Node.js 20), which is
      # deprecated and will break after June 2 2026. This env var silences the
      # warning and future-proofs the job until codecov ships an updated bundle.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nmap

      - name: Wait for services
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y redis-tools wget netcat-openbsd
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done'
          timeout 30 bash -c 'until redis-cli -h localhost -p 6379 ping | grep -q PONG; do sleep 1; done'
          timeout 30 bash -c 'until wget --quiet --tries=1 --spider http://localhost:8080; do sleep 1; done'
          timeout 30 bash -c 'until nc -z localhost 8022; do sleep 1; done'

      - name: Create test database and user
        run: |
          # Create test user
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE USER scanorama_test_user WITH PASSWORD 'test_password_123';" || echo "User may already exist"

          # Create test database
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE scanorama_test OWNER scanorama_test_user;" || echo "Database may already exist"

          # Grant permissions
          PGPASSWORD=postgres psql -h localhost -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE scanorama_test TO scanorama_test_user;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d scanorama_test -c "GRANT ALL ON SCHEMA public TO scanorama_test_user;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d scanorama_test -c "GRANT CREATE ON SCHEMA public TO scanorama_test_user;"

          # Verify test database is ready
          PGPASSWORD=test_password_123 psql -h localhost -U scanorama_test_user -d scanorama_test -c "SELECT 1;" > /dev/null && echo "✅ Test database is ready"

      - name: Run integration tests
        run: |
          # Run all tests (including integration tests that need database) with coverage
          go test -v -p 1 -coverprofile=integration_coverage.out -covermode=atomic ./...
          go tool cover -func=integration_coverage.out | tail -1

      - name: Upload complete coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./integration_coverage.out
          name: codecov-umbrella
          slug: anstrom/scanorama
          flags: integration
          fail_ci_if_error: true
          verbose: true
          # Carry forward coverage from the previous upload for any flags not
          # present in this run (e.g. unit flag when only integration runs).
          # This prevents the badge dropping to "unknown" on non-Go commits.
          carryforward: unit

      - name: Run database migration tests
        run: |
          go test -v ./internal/db/... -tags=integration

  # Stage 4: End-to-End Tests
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.unit-tests.result == 'success' &&
      (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main'))

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      ssh:
        image: lscr.io/linuxserver/openssh-server:latest
        ports:
          - 8022:2222
        env:
          PUID: 1000
          PGID: 1000
          PASSWORD_ACCESS: true
          USER_PASSWORD: testpass
          USER_NAME: testuser
        options: >-
          --health-cmd "ps aux | grep sshd"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: scanorama_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432
      TEST_DB_NAME: scanorama_test
      TEST_DB_USER: scanorama_test_user
      TEST_DB_PASSWORD: test_password_123
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nmap redis-tools netcat-openbsd

      - name: Setup test environment
        run: |
          # Wait for services
          timeout 30 bash -c 'until redis-cli -h localhost -p 6379 ping | grep -q PONG; do sleep 1; done'
          timeout 30 bash -c 'until nc -z localhost 8022; do sleep 1; done'

          # Wait for PostgreSQL
          timeout 30 bash -c 'until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done'

          # Create test database and user
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE USER scanorama_test_user WITH PASSWORD 'test_password_123';" || echo "User may already exist"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE scanorama_test OWNER scanorama_test_user;" || echo "Database may already exist"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE scanorama_test TO scanorama_test_user;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d scanorama_test -c "GRANT ALL ON SCHEMA public TO scanorama_test_user;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d scanorama_test -c "GRANT CREATE ON SCHEMA public TO scanorama_test_user;"

      - name: Download dependencies
        run: |
          go mod download
          go mod verify

      - name: Build binary
        run: make build

      - name: Run end-to-end tests
        run: |
          go test -v ./test/integration_test.go
