name: "Setup Test Database"
description: "Sets up PostgreSQL database for testing"
inputs:
  postgres-version:
    description: "PostgreSQL version to use"
    required: false
    default: "16-alpine"
  database-host:
    description: "Database host"
    required: false
    default: "localhost"
  database-port:
    description: "Database port"
    required: false
    default: "5432"
  database-name:
    description: "Database name"
    required: false
    default: "scanorama_test"
  postgres-user:
    description: "PostgreSQL admin user"
    required: false
    default: "postgres"
  postgres-password:
    description: "PostgreSQL admin password"
    required: false
    default: "postgres"
  database-user:
    description: "Database user"
    required: false
    default: "test_user"
  database-password:
    description: "Database password"
    required: false
    default: "test_password"

runs:
  using: "composite"
  steps:
    - name: Install PostgreSQL client
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y postgresql-client

    - name: Wait for PostgreSQL
      shell: bash
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..60}; do
          if pg_isready -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.postgres-user }} -d ${{ inputs.database-name }}; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Waiting for PostgreSQL ($i/60)..."
          sleep 2
        done

    - name: Setup test user and extensions
      shell: bash
      env:
        PGPASSWORD: ${{ inputs.postgres-password }}
      run: |
        echo "Creating test user and setting up database..."
        psql -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.postgres-user }} -d ${{ inputs.postgres-user }} -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '${{ inputs.database-user }}') THEN CREATE USER ${{ inputs.database-user }} WITH PASSWORD '${{ inputs.database-password }}' CREATEDB SUPERUSER; END IF; END \$\$;"
        psql -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.postgres-user }} -d ${{ inputs.database-name }} -c "GRANT ALL PRIVILEGES ON DATABASE ${{ inputs.database-name }} TO ${{ inputs.database-user }};"

        echo "Setting up database extensions..."
        psql -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.postgres-user }} -d ${{ inputs.database-name }} -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
        psql -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.postgres-user }} -d ${{ inputs.database-name }} -c "CREATE EXTENSION IF NOT EXISTS \"btree_gist\";"

        echo "Verifying database setup..."
        psql -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.postgres-user }} -d ${{ inputs.database-name }} -c "SELECT version();"
        PGPASSWORD=${{ inputs.database-password }} psql -h ${{ inputs.database-host }} -p ${{ inputs.database-port }} -U ${{ inputs.database-user }} -d ${{ inputs.database-name }} -c "SELECT current_database(), current_user;"

    - name: Create database config
      shell: bash
      run: |
        mkdir -p test/fixtures
        cat > test/fixtures/database.yml << EOF
        test:
          host: ${{ inputs.database-host }}
          port: ${{ inputs.database-port }}
          database: ${{ inputs.database-name }}
          username: ${{ inputs.database-user }}
          password: ${{ inputs.database-password }}
          ssl_mode: disable
        EOF
